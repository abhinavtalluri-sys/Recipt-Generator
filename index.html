<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Receipt Generator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { 
      --primary: #1a73e8; 
      --muted: #666; 
      --bg: #f5f7fb; 
      --card: #fff; 
      --border: #d6dbe8;
      --success: #4caf50;
      --error: #ef4444;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body { 
      margin: 0; 
      font-family: "Segoe UI", Arial, sans-serif; 
      background: var(--bg); 
      color: #222; 
    }
    
    .wrap { 
      max-width: 980px; 
      margin: 28px auto; 
      padding: 18px; 
      display: flex; 
      gap: 18px; 
      flex-wrap: wrap; 
      align-items: flex-start; 
      justify-content: center; 
    }
    
    .card { 
      background: var(--card); 
      border-radius: 10px; 
      padding: 18px; 
      box-shadow: 0 6px 18px rgba(0,0,0,0.06); 
      width: 420px; 
      box-sizing: border-box; 
    }
    
    h1 { 
      font-size: 20px; 
      margin: 0 0 10px; 
      color: var(--primary); 
      text-align: center; 
    }
    
    label { 
      display: block; 
      margin-top: 12px; 
      font-weight: 600; 
      color: #2b2b2b; 
    }
    
    select, input, textarea, button { 
      width: 100%; 
      padding: 10px 12px; 
      margin-top: 6px; 
      border-radius: 8px; 
      border: 1px solid var(--border); 
      font-size: 14px; 
      box-sizing: border-box; 
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
    }
    
    input[readonly] {
      background-color: #f5f5f5;
      cursor: not-allowed;
    }
    
    textarea { 
      min-height: 84px; 
      resize: vertical; 
    }
    
    button { 
      background: var(--primary); 
      color: #fff; 
      border: 0; 
      font-weight: 700; 
      cursor: pointer; 
      padding: 12px; 
      border-radius: 8px; 
      margin-top: 14px; 
      transition: background 0.2s;
    }
    
    button:hover {
      background: #1557b0;
    }
    
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }
    
    .small { 
      font-size: 13px; 
      color: var(--muted); 
      margin-top: 8px; 
    }
    
    #overlay { 
      position: fixed; 
      inset: 0; 
      display: none; 
      background: rgba(255,255,255,0.8); 
      align-items: center; 
      justify-content: center; 
      z-index: 9999; 
    }
    
    .spinner { 
      width: 56px; 
      height: 56px; 
      border-radius: 50%; 
      border: 6px solid #eee; 
      border-top: 6px solid var(--primary); 
      animation: spin 1s linear infinite; 
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
    
    .result { 
      width: 100%; 
      max-width: 940px; 
      margin-top: 8px; 
    }
    
    .result .box { 
      text-align: center; 
      padding: 20px; 
    }
    
    .button-link { 
      display: inline-block; 
      padding: 10px 16px; 
      background: var(--primary); 
      color: #fff; 
      text-decoration: none; 
      border-radius: 8px; 
      font-weight: 700; 
      margin-top: 10px; 
    }
    
    .button-link:hover {
      background: #1557b0;
    }
    
    iframe.preview { 
      width: 100%; 
      max-width: 760px; 
      height: 820px; 
      border: 0; 
      margin-top: 14px; 
      border-radius: 8px; 
    }
    
    #toast { 
      display: none; 
      position: fixed; 
      left: 50%; 
      transform: translateX(-50%); 
      bottom: 26px; 
      background: var(--error); 
      color: #fff; 
      padding: 10px 16px; 
      border-radius: 8px; 
      z-index: 10001; 
    }

    /* Searchable Dropdown Styles */
    .searchable-dropdown { 
      position: relative; 
      width: 100%; 
    }
    
    .dropdown-display { 
      width: 100%; 
      padding: 10px 12px; 
      margin-top: 6px; 
      border-radius: 8px; 
      border: 1px solid var(--border); 
      font-size: 14px; 
      box-sizing: border-box; 
      cursor: pointer; 
      background: #fff; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    
    .dropdown-display:focus { 
      outline: none; 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px rgba(26,115,232,0.06); 
    }
    
    .dropdown-display::after { 
      content: '▼'; 
      color: var(--muted); 
      font-size: 12px; 
    }
    
    .dropdown-content { 
      position: absolute; 
      top: 100%; 
      left: 0; 
      right: 0; 
      background: #fff; 
      border: 1px solid var(--border); 
      border-top: none; 
      border-radius: 0 0 8px 8px; 
      max-height: 250px; 
      overflow-y: auto; 
      z-index: 1000; 
      display: none; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
    }
    
    .dropdown-search { 
      width: 100%; 
      padding: 8px 12px; 
      border: none; 
      border-bottom: 1px solid #e0e0e0; 
      font-size: 14px; 
      box-sizing: border-box; 
      outline: none; 
    }
    
    .dropdown-search:focus { 
      border-bottom-color: var(--primary); 
    }
    
    .dropdown-options { 
      max-height: 200px; 
      overflow-y: auto; 
    }
    
    .dropdown-option { 
      padding: 10px 12px; 
      cursor: pointer; 
      border-bottom: 1px solid #f0f0f0; 
    }
    
    .dropdown-option:hover { 
      background-color: #f5f5f5; 
    }
    
    .dropdown-option:last-child { 
      border-bottom: none; 
    }
    
    .dropdown-option.selected { 
      background-color: var(--primary); 
      color: white; 
    }
    
    .no-results { 
      padding: 10px 12px; 
      color: var(--muted); 
      text-align: center; 
      font-style: italic; 
    }

    /* Radio button styles */
    .radio-group { 
      display: flex; 
      gap: 20px; 
      margin-top: 8px; 
      flex-wrap: wrap; 
    }
    
    .radio-option { 
      display: flex; 
      align-items: center; 
      gap: 5px; 
      cursor: pointer;
    }
    
    .radio-option input[type="radio"] { 
      width: auto; 
      margin: 0; 
      cursor: pointer;
    }
    
    .radio-option:hover {
      color: var(--primary);
    }

    /* Last receipt area */
    #lastArea {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    #lastArea.has-data {
      border: 2px solid var(--success);
      background: #f0f9f0;
    }

    /* Success message styles */
    .success-message {
      background: #e8f5e8;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid var(--success);
      margin-bottom: 15px;
      text-align: left;
    }

    .success-message div {
      color: #2e7d32;
      margin: 5px 0;
    }

    /* Responsive */
    @media(max-width: 940px) { 
      .wrap { 
        flex-direction: column; 
        align-items: center; 
      } 
      .card { 
        width: 92%; 
      } 
      .result .box { 
        width: 92%; 
      } 
      iframe.preview {
        height: 600px;
      }
    }

    @media(max-width: 480px) {
      .radio-group {
        flex-direction: column;
        gap: 10px;
      }
      
      iframe.preview {
        height: 400px;
      }
    }

    /* Loading state */
    .loading-placeholder {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    /* Customer preview */
    #customerPreview, #riderPreview {
      background: #f8f9fa;
      padding: 8px;
      border-radius: 6px;
      margin-top: 8px;
      border-left: 3px solid var(--primary);
    }

    /* Required field indicator */
    label.required::after {
      content: " *";
      color: var(--error);
      font-weight: bold;
    }

    /* Helper text */
    .helper-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Amount input */
    input[type="number"] {
      -moz-appearance: textfield;
    }
    
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-placeholder">
      <div class="spinner" style="margin: 20px auto;"></div>
      <div>Loading Receipt Generator...</div>
    </div>
  </div>

  <div id="overlay">
    <div style="text-align:center">
      <div class="spinner"></div>
      <div style="margin-top:12px; font-weight:700; color: var(--primary);">Generating receipt...</div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
